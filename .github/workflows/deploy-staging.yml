name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-gce
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and change summary
        id: info
        run: |
          VERSION=$(grep -oP 'DEV v[\d.]+' frontend/app/chat/page.tsx || echo "DEV v?")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Get meaningful commit messages (skip merge commits)
          CHANGES=$(git log --no-merges --format="%s" HEAD~1..HEAD 2>/dev/null | head -3 | tr '\n' ' ' || echo "")
          if [ -z "$CHANGES" ]; then
            # Fallback: extract feature name from merge commit message
            CHANGES=$(echo '${{ github.event.head_commit.message }}' | sed -n "s/.*feature\\/\\(.*\\)' into.*/\\1/p" | tr '-' ' ')
          fi
          echo "changes=$CHANGES" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to staging
        run: |
          gcloud compute ssh yutookiguchi@bitpoint-bot \
            --zone=us-west1-b \
            --tunnel-through-iap \
            --command="bash /home/yutookiguchi/claudia-staging/deploy/deploy-staging.sh"

      - name: Health check
        run: |
          gcloud compute ssh yutookiguchi@bitpoint-bot \
            --zone=us-west1-b \
            --tunnel-through-iap \
            --command="curl -sf http://127.0.0.1:8002/health"

      - name: Slack notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            STATUS="成功"
          else
            EMOJI="❌"
            STATUS="失敗"
          fi
          VERSION="${{ steps.info.outputs.version }}"
          CHANGES="${{ steps.info.outputs.changes }}"
          curl -sX POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${EMOJI} *claudia ステージング* デプロイ${STATUS} [${VERSION}]\n>${CHANGES}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions>\"}"
