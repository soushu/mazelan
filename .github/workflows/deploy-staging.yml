name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-gce
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Extract version and change summary
        id: info
        run: |
          VERSION=$(grep -oE 'DEV v[0-9.]+' frontend/app/chat/page.tsx || echo "DEV v?")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # For merge commits: get feature branch commit messages via HEAD^1..HEAD^2
          CHANGES=""
          if git rev-parse HEAD^2 >/dev/null 2>&1; then
            CHANGES=$(git log --no-merges --format="%s" HEAD^1..HEAD^2 2>/dev/null | head -3 | paste -sd ", " -)
          fi
          # Fallback: use the commit message itself (for non-merge pushes)
          if [ -z "$CHANGES" ]; then
            CHANGES="${{ github.event.head_commit.message }}"
            CHANGES=$(echo "$CHANGES" | head -1)
          fi
          echo "changes=$CHANGES" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to staging
        run: |
          gcloud compute ssh ${{ secrets.GCE_SSH_USER }}@${{ secrets.GCE_INSTANCE }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --tunnel-through-iap \
            --command="DEPLOY_USER=${{ secrets.GCE_SSH_USER }} bash /home/${{ secrets.GCE_SSH_USER }}/${{ secrets.GCE_DEPLOY_DIR_STAGING }}/deploy/deploy-staging.sh"

      - name: Health check
        run: |
          gcloud compute ssh ${{ secrets.GCE_SSH_USER }}@${{ secrets.GCE_INSTANCE }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --tunnel-through-iap \
            --command="curl -sf http://127.0.0.1:8002/health"

      - name: Slack notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            STATUS="成功"
          else
            EMOJI="❌"
            STATUS="失敗"
          fi
          VERSION="${{ steps.info.outputs.version }}"
          CHANGES="${{ steps.info.outputs.changes }}"
          # Sanitize: remove double quotes to prevent JSON breakage
          CHANGES=$(echo "$CHANGES" | tr '"' "'")
          curl -sX POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${EMOJI} *Mazelan ステージング* デプロイ${STATUS} [${VERSION}]\n>${CHANGES}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions>\"}"
