name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-gce
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to production
        run: |
          gcloud compute ssh ${{ secrets.GCE_SSH_USER }}@${{ secrets.GCE_INSTANCE }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --tunnel-through-iap \
            --command="DEPLOY_USER=${{ secrets.GCE_SSH_USER }} bash /home/${{ secrets.GCE_SSH_USER }}/${{ secrets.GCE_DEPLOY_DIR }}/deploy/deploy-prod.sh"

      - name: Health check
        run: |
          gcloud compute ssh ${{ secrets.GCE_SSH_USER }}@${{ secrets.GCE_INSTANCE }} \
            --zone=${{ secrets.GCE_ZONE }} \
            --tunnel-through-iap \
            --command="curl -sf http://127.0.0.1:8000/health"

      - name: Slack notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            STATUS="成功"
          else
            EMOJI="❌"
            STATUS="失敗"
          fi
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | tr '"' "'")
          curl -sX POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "{\"text\": \"${EMOJI} *Mazelan 本番* デプロイ${STATUS}\n>${COMMIT_MSG}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions>\"}"
